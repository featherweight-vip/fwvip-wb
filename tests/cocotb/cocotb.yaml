
fragment:

  tasks:
  # ----------------------------------------------------------------------
  # Cocotb smoke: initiator/target/monitor cores wired in a plain Verilog
  # top, driven from Python via cocotb. We run the SAME top + test on BOTH
  # simulators:
  #   * Verilator (cocotb.vlt / hdlsim.vlt)  -> org.fwvip.wb.cocotb-check
  #   * Icarus    (cocotb.ivl / hdlsim.ivl)  -> org.fwvip.wb.cocotb-ivl-check
  #
  # The cocotb top drives TOP-LEVEL reg/logic signals (init_*/tgt_*/mon_*),
  # not sub-instance core ports, which works on both simulators -- so one top
  # + one backend covers both. (Driving sub-instance input ports works on
  # Icarus but NOT Verilator, which recomputes them each eval; see the backend
  # docstring + the skill design §11.2 #9.)
  #
  # cocotb support comes from the dv-flow-libcocotb package (the cocotb.* tasks),
  # which emits data items that drive the plain hdlsim.<sim> tasks.
  # ----------------------------------------------------------------------
  - name: cocotb-tb-src
    uses: std.FileSet
    with:
      type: systemVerilogSource
      base: .
      include: ["fwvip_wb_cocotb_top.sv"]

  # Selects the cocotb test module + HDL toplevel (shared by both sims).
  - name: cocotb-testcfg
    uses: cocotb.TestConfig
    with:
      module: ["test_fwvip_wb"]
      toplevel: fwvip_wb_cocotb_top

  # ---- Verilator chain (primary entrypoint: cocotb-check) ---------------
  # pythonpath makes both the testbench module (this dir) and the Wishbone VIP
  # front-end (src/python -> import org.fwvip.wb) importable at sim runtime;
  # libcocotb does NOT inherit the ambient PYTHONPATH, so both must be listed.
  - name: cocotb-vlt-setup
    uses: cocotb.vlt.Setup
    with:
      pythonpath: [".", "../../src/python"]

  - name: cocotb-vlt-sim-img
    uses: hdlsim.vlt.SimImage
    needs: [fw.proto.wb.xtor-core, cocotb-tb-src, cocotb-vlt-setup]
    with:
      top: ["fwvip_wb_cocotb_top"]

  - name: cocotb-vlt-sim-run
    uses: hdlsim.vlt.SimRun
    needs: [cocotb-vlt-sim-img, cocotb-testcfg]

  - name: cocotb-check
    uses: cocotb.CheckResults
    needs: [cocotb-vlt-sim-run]

  # ---- Icarus chain -----------------------------------------------------
  - name: cocotb-ivl-setup
    uses: cocotb.ivl.Setup
    with:
      pythonpath: [".", "../../src/python"]

  - name: cocotb-ivl-sim-img
    uses: hdlsim.ivl.SimImage
    needs: [fw.proto.wb.xtor-core, cocotb-tb-src, cocotb-ivl-setup]
    with:
      top: ["fwvip_wb_cocotb_top"]

  - name: cocotb-ivl-sim-run
    uses: hdlsim.ivl.SimRun
    needs: [cocotb-ivl-sim-img, cocotb-testcfg]

  - name: cocotb-ivl-check
    uses: cocotb.CheckResults
    needs: [cocotb-ivl-sim-run]
