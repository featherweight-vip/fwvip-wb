
fragment:

  tasks:
  # ----------------------------------------------------------------------
  # Core back-to-back smoke: initiator core <-> target core (no SV layer).
  # Uses the Wishbone/RV convenience macros vendored locally (bus-macros).
  # ----------------------------------------------------------------------
  - name: core-b2b-tb-src
    uses: std.FileSet
    needs:
    - bus-macros
    with:
      type: systemVerilogSource
      base: .
      include: ["fwvip_wb_transactor_core_b2b.sv"]

  - name: core-b2b-sim-img
    uses: hdlsim.${{sim}}.SimImage
    needs:
    - fw.proto.wb.xtor-core
    - core-b2b-tb-src
    with:
      top: ["fwvip_wb_transactor_core_b2b"]
      trace: true
      defines:
      - TRACE_EN

  - name: core-b2b-sim-run
    uses: hdlsim.${{sim}}.SimRun
    needs:
    - core-b2b-sim-img

  # ----------------------------------------------------------------------
  # Monitor core standalone smoke
  # ----------------------------------------------------------------------
  - name: mon-tb-src
    uses: std.FileSet
    needs:
    - bus-macros
    with:
      type: systemVerilogSource
      base: .
      include: ["fwvip_wb_monitor_core_tb.sv"]

  - name: mon-sim-img
    uses: hdlsim.${{sim}}.SimImage
    needs:
    - fw.proto.wb.xtor-core
    - mon-tb-src
    with:
      top: ["fwvip_wb_monitor_core_tb"]
      trace: true
      defines:
      - TRACE_EN

  - name: mon-sim-run
    uses: hdlsim.${{sim}}.SimRun
    needs:
    - mon-sim-img

  # ----------------------------------------------------------------------
  # UVM testbench: HDL/HVL tops + the compiled UVM simulation image.
  # ----------------------------------------------------------------------
  - name: uvm-tb
    uses: std.FileSet
    needs: [tests]
    with:
      type: systemVerilogSource
      base: .
      incdirs: ["."]
      include:
      - fwvip_wb_hdl_top.sv
      - fwvip_wb_hvl_top.sv

  - name: uvm-sim-img
    uses: hdlsim.${{sim}}.SimImage
    needs:
    - bus-macros
    - hdlsim.${{sim}}.SimLibUVM
    - xtor-pkg
    - fw.proto.wb.xtor-sv
    # Core clock/reset transactor interfaces instantiated by fwvip_wb_hdl_top.
    - org.fwvip.core.clock-reset-xtor
    - uvm-tb
    with:
      top: [fwvip_wb_hvl_top]
      trace: true
      defines:
      - TRACE_EN

  # Bare UVM run (no scenario selected -> base test runs the default smoke
  # virtual sequence). Concrete per-test entrypoints live in uvm/tests/flow.yaml.
  - name: uvm-sim-run-base
    uses: hdlsim.${{sim}}.SimRun
    needs:
    - uvm-sim-img
    with:
      plusargs:
      - UVM_TESTNAME=fwvip_wb_test_base
