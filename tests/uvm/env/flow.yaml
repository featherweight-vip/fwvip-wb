
fragment:

  tasks:
  # ----------------------------------------------------------------------
  # UVM environment: reusable components (agents, scoreboard, vseq library,
  # virtual sequencer) packaged in fwvip_wb_env_pkg.
  # ----------------------------------------------------------------------
  - name: env
    uses: std.FileSet
    # fwvip_wb_env_pkg imports fwvip_core_pkg + fwvip_core_uvm_pkg, so the core
    # UVM provider package (and its plain-SV base) must compile first.
    needs: [vip-uvm-hvlsrc, org.fwvip.core.core-uvm-pkg]
    with:
      type: systemVerilogSource
      base: .
      incdirs: ["."]
      include: "*.sv"
