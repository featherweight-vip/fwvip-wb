
fragment:
  tasks:
  # ----------------------------------------------------------------------
  # Core transactors only -- pure module/signal level, no SV interfaces or
  # classes. Suitable for use in a pure-Verilog environment.
  # ----------------------------------------------------------------------
  - export: xtor-core
    uses: std.FileSet
    with:
      type: systemVerilogSource
      base: sv
      incdirs: ["."]
      include:
      - fwvip_wb_initiator_xtor_core.sv
      - fwvip_wb_target_xtor_core.sv
      - fwvip_wb_monitor_xtor_core.sv

  # ----------------------------------------------------------------------
  # SV + Verilog portion -- the transactor interfaces (in-built FIFOs +
  # task API) and the integration modules that wire interface + core.
  # ----------------------------------------------------------------------
  - export: xtor-sv
    uses: std.FileSet
    needs:
    - xtor-core
    with:
      type: systemVerilogSource
      base: sv
      incdirs: ["."]
      include:
      - fwvip_wb_xtor_pkg.sv
      - fwvip_wb_initiator_xtor_if.sv
      - fwvip_wb_target_xtor_if.sv
      - fwvip_wb_monitor_xtor_if.sv
      - fwvip_wb_initiator_xtor.sv
      - fwvip_wb_target_xtor.sv
      - fwvip_wb_monitor_xtor.sv

  # ----------------------------------------------------------------------
  # UVM agent layer (classes) built on top of the SV transactors.
  # ----------------------------------------------------------------------
  - name: vip-uvm-hvlsrc
    needs: [xtor-sv]
    uses: std.FileSet
    with:
      type: systemVerilogSource
      base: uvm
      include: "*.sv"
      incdirs: ["."]

  - name: assertions
    uses: std.FileSet
    with:
      type: systemVerilogSource
      base: assertions
      include:
      - fwvip_wb_checker.sv
