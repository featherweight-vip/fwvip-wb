
package:
  name: org.fwvip.wb
  with:
    sim:
      type: str 
      value: "vlt"


  imports:
  # The core Wishbone transactor now lives here (migrated out of this VIP).
  # (fwprotocol-defs was dropped; its TB macros are vendored locally as bus-macros.)
  - "${{ rootdir }}/packages/fw-proto-wb/flow.yaml"
  # Core clock/reset transactors + their UVM config providers (org.fwvip.core).
  # The TB binds these and the env consumes them for reset synchronization.
  - "${{ rootdir }}/packages/fwvip-core/flow.yaml"

  tasks: []

  fragments:
  - src/vip.yaml
  # tests/flow.yaml dropped locally (as for fwvip-gpio): it pulls cocotb.* tasks
  # (dv-flow-libcocotb, not imported here). fw-wb-dma consumes only the VIP src
  # (org.fwvip.wb.vip-uvm-hvlsrc). ivpm re-fetch reverts this local patch.
  # - tests/flow.yaml
