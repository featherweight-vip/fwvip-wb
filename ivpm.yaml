
package:
  name: fwvip-wb

  #  setup-deps:
  #- ninja
  #- cython

  dep-sets:


  - name: default-dev
    deps:
    - name: pytest
      src: pypi
    - name: click
      src: pypi
    - name: fw-proto-wb
      url: https://github.com/featherweight-ip/fw-proto-wb.git
    - name: fw-proto-uart
      url: https://github.com/featherweight-ip/fw-proto-uart.git
    - name: fwvip-uart
      url: https://github.com/featherweight-vip/fwvip-uart.git
    - name: pyhdl-if
      url: https://github.com/fvutils/pyhdl-if.git
    - name: pytest-dfm
      url: https://github.com/dv-flow/pytest-dfm.git
    - name: dv-flow-libcocotb
      url: https://github.com/dv-flow/dv-flow-libcocotb.git
    - name: dv-flow-libhdlsim
      url: https://github.com/dv-flow/dv-flow-libhdlsim.git
    - name: dv-flow-libformal
      url: https://github.com/dv-flow/dv-flow-libformal.git
    - name: fwvip-core
      url: https://github.com/featherweight-vip/fwvip-core.git
    - name: iverilog
      src: gh-rls 
      url: https://github.com/edapack/iverilog-bin
    - name: cocotb
      src: pypi

  - name: default
    # fwprotocol-defs was removed: the only thing the VIP used from it was the
    # Wishbone/RV testbench macros, now vendored locally under src/macros
    # (exported as the `bus-macros` FileSet). The core transactor itself comes
    # from fw-proto-wb (default-dev).
    deps: []

  
  paths:
    project:
      lib-dirs:
      - tests
      - src
    export:
      lib-dirs:
      - src
      




