
package:
  name: fwvip-wb

  #  setup-deps:
  #- ninja
  #- cython

  dep-sets:


  - name: default-dev
    deps:
    - name: pytest
      src: pypi
    - name: pyhdl-if
      url: https://github.com/fvutils/pyhdl-if.git
    - name: pytest-dfm
      url: https://github.com/dv-flow/pytest-dfm.git
    - name: dv-flow-libhdlsim
      url: https://github.com/dv-flow/dv-flow-libhdlsim.git
    - name: dv-flow-libformal
      url: https://github.com/dv-flow/dv-flow-libformal.git
    - name: cocotb
      src: pypi

  - name: default
    deps:
    # Provides the Wishbone/RV testbench macros (wishbone_macros.svh,
    # rv_macros.svh) and the org.featherweight-ip.protocol-defs flow package.
    # Declared directly (previously reached transitively via fwvip-common).
    - name: fwprotocol-defs
      url: https://github.com/featherweight-ip/fwprotocol-defs.git

  
  paths:
    project:
      lib-dirs:
      - tests
      - src
    export:
      lib-dirs:
      - src
      




